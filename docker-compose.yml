services:
  redis:
    image: redis:7-alpine
    container_name: review-summarizer-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: review-summarizer-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-review_summarizer}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: review-summarizer-api
    environment:
      APP_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-review_summarizer}
      APP_REDIS_URL: ${APP_REDIS_URL:-redis://redis:6379/0}
      APP_MODE: api

      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-review_summarizer}

      APP_API_HOST: 0.0.0.0
      APP_API_PORT: 8000

      APP_STREAMLIT_PORT: ${APP_STREAMLIT_PORT:-8501}

      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}

      APP_OPENAI_API_KEY: ${APP_OPENAI_API_KEY:-}
      APP_OPENAI_MODEL: ${APP_OPENAI_MODEL:-gpt-5.4-mini}
      APP_OPENAI_MODEL_MINI: ${APP_OPENAI_MODEL_MINI:-gpt-5.4-nano}
      APP_PUBLIC_API_BASE_URL: ${APP_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "${APP_API_PORT:-8000}:8000"
    depends_on:
      - db
      - redis
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  review_suggestions_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: review-summarizer-review-suggestions-worker
    environment:
      APP_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-review_summarizer}
      APP_REDIS_URL: ${APP_REDIS_URL:-redis://redis:6379/0}
      APP_MODE: review_suggestions_worker
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
      APP_REVIEW_SUGGESTIONS_EMBEDDING_MODEL: ${APP_REVIEW_SUGGESTIONS_EMBEDDING_MODEL:-cointegrated/rubert-tiny2}
    depends_on:
      - db
      - redis
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: review-summarizer-app
    environment:
      APP_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-review_summarizer}
      APP_REDIS_URL: ${APP_REDIS_URL:-redis://redis:6379/0}
      APP_MODE: streamlit
      APP_STREAMLIT_PORT: ${APP_STREAMLIT_PORT:-8501}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
      APP_OPENAI_API_KEY: ${APP_OPENAI_API_KEY:-}
      APP_OPENAI_MODEL: ${APP_OPENAI_MODEL:-gpt-5.4-mini}
      APP_OPENAI_MODEL_MINI: ${APP_OPENAI_MODEL_MINI:-gpt-5.4-nano}
      APP_PUBLIC_API_BASE_URL: ${APP_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "${APP_STREAMLIT_PORT:-8501}:8501"
    depends_on:
      - db
      - redis
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
